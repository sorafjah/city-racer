<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>シティレーサー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#7fb8e6; touch-action:none; overscroll-behavior:none;
    font-family:'BIZ UDPGothic', sans-serif; }
  canvas { display:block; position:fixed; inset:0; }

  .panel { background:rgba(15,25,40,.55); color:#fff; border-radius:14px; backdrop-filter:blur(3px); }

  /* ===== HUD ===== */
  #hud { position:fixed; top:10px; left:10px; padding:10px 14px; z-index:5; min-width:170px; pointer-events:none; display:none; }
  #hud .lap { font-size:22px; font-weight:700; }
  #hud .time { font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; }
  #hud .sub { font-size:13px; opacity:.9; font-variant-numeric:tabular-nums; }
  #speed { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:5; padding:6px 18px;
    font-size:24px; font-weight:700; pointer-events:none; display:none; font-variant-numeric:tabular-nums; }
  #boostMsg { position:fixed; top:22%; left:50%; transform:translateX(-50%); z-index:6; color:#ffd24a;
    font-size:34px; font-weight:700; text-shadow:0 2px 6px rgba(0,0,0,.6); display:none; pointer-events:none; }
  #comboMsg { position:fixed; top:13%; left:50%; transform:translateX(-50%); z-index:6; color:#ff8a3c;
    font-size:30px; font-weight:700; text-shadow:0 2px 6px rgba(0,0,0,.6); display:none; pointer-events:none; }
  #introSkip { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:6; color:#fff;
    font-size:14px; opacity:.8; display:none; pointer-events:none; }
  #wrongMsg { position:fixed; top:32%; left:50%; transform:translateX(-50%); z-index:6; color:#fff;
    font-size:20px; font-weight:700; text-shadow:0 2px 6px rgba(0,0,0,.6); display:none; pointer-events:none; }

  /* ===== top-right buttons ===== */
  #topBtns { position:fixed; top:10px; right:10px; z-index:6; display:none; gap:10px; }
  .sqBtn { width:56px; height:56px; border:none; border-radius:14px; background:rgba(15,25,40,.55); color:#fff;
    font-size:13px; font-weight:700; font-family:inherit; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .sqBtn span { font-size:22px; line-height:1; }
  .sqBtn:active { background:rgba(70,120,190,.8); }

  /* ===== drive controls ===== */
  #ctrlL { position:fixed; left:20px; bottom:20px; z-index:6; display:none; }
  #stickBase { position:relative; width:150px; height:150px; border-radius:50%;
    background:rgba(15,25,40,.45); border:2px solid rgba(255,255,255,.28); touch-action:none; }
  #stickKnob { position:absolute; left:50%; top:50%; width:64px; height:64px; border-radius:50%;
    background:#3a6ea8; transform:translate(-50%,-50%); box-shadow:0 4px 10px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; pointer-events:none; }
  #ctrlR { position:fixed; right:20px; bottom:24px; z-index:6; display:none; gap:14px; align-items:center; }
  .drvBtn { border:none; border-radius:50%; color:#fff; font-family:inherit; font-weight:700;
    box-shadow:0 4px 10px rgba(0,0,0,.35); }
  #btnAccel { width:76px; height:76px; background:#2f9e57; font-size:14px; }
  #btnBack { width:76px; height:76px; background:#c94141; font-size:11.5px; line-height:1.35; }
  .drvBtn.on { filter:brightness(1.4); transform:scale(.96); }

  /* ===== overlays ===== */
  .overlay { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:18px; background:rgba(10,18,32,.72); color:#fff; text-align:center; padding:20px; }
  .overlay h1 { font-size:min(9vw,52px); font-weight:700; text-shadow:0 3px 0 #1c3a5e, 0 6px 14px rgba(0,0,0,.5); }
  .overlay p { font-size:15px; line-height:1.8; }
  .bigBtn { border:none; border-radius:16px; background:#ffb02e; color:#4a2c00; font-family:inherit;
    font-size:24px; font-weight:700; padding:18px 56px; box-shadow:0 5px 0 #b87400; }
  .bigBtn:active { transform:translateY(3px); box-shadow:0 2px 0 #b87400; }
  #countdown { position:fixed; inset:0; z-index:15; display:none; align-items:center; justify-content:center;
    pointer-events:none; }
  #countNum { font-size:min(30vw,180px); font-weight:700; color:#fff; text-shadow:0 4px 0 #1c3a5e, 0 10px 24px rgba(0,0,0,.5); }
  #result { display:none; }
  #result table { border-collapse:collapse; font-size:17px; font-variant-numeric:tabular-nums; }
  #result td { padding:4px 14px; }
  #result .best { color:#ffd24a; font-weight:700; }
  .note { font-size:12.5px; opacity:.85; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
</head>
<body>

<!-- HUD -->
<div id="hud" class="panel">
  <div class="lap" id="lapText">LAP 1/3</div>
  <div class="time" id="totalText">0:00.000</div>
  <div class="sub" id="lastLapText">ラップ --:--.---</div>
  <div class="sub" id="bestLapText">ベスト --:--.---</div>
</div>
<div id="speed" class="panel">0 km/h</div>
<div id="boostMsg">ブースト！</div>
<div id="comboMsg">3 コンボ！</div>
<div id="introSkip">タップでスキップ</div>
<div id="wrongMsg">画面を上にスワイプ！ゴロンと元にもどるよ</div>

<div id="topBtns" style="display:none;">
  <button class="sqBtn" id="btnView"><span>&#128247;</span>視点</button>
  <button class="sqBtn" id="btnSound"><span>&#9834;</span>音</button>
  <button class="sqBtn" id="btnReset"><span>&#10226;</span>リセット</button>
</div>

<div id="ctrlL">
  <div id="stickBase"><div id="stickKnob">&#9664;&#9654;</div></div>
</div>
<div id="ctrlR">
  <button class="drvBtn" id="btnBack">バック<br>ブレーキ</button>
  <button class="drvBtn" id="btnAccel">アクセル</button>
</div>

<!-- title -->
<div class="overlay" id="title">
  <h1>シティレーサー</h1>
  <p>街の中をぐるっと 3周してゴールをめざそう！<br>
  かいだん・ジャンプ台・水たまり・でこぼこ道…<br>
  電柱をなぎたおせ！自販機をふっとばせ！<br>
  こわしてはねて、はでに走ろう！</p>
  <button class="bigBtn" id="btnStart">スタート</button>
  <p class="note">左：スティックでハンドル　　右：アクセル / バック（ブレーキ）<br>
  右上のボタンで 視点切りかえ・音・リセット　（横向きがおすすめ）</p>
</div>

<!-- countdown -->
<div id="countdown"><div id="countNum">3</div></div>

<!-- result -->
<div class="overlay" id="result">
  <h1>ゴール！</h1>
  <table id="resultTable"></table>
  <button class="bigBtn" id="btnRetry">もう一回</button>
</div>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ============================================================
   ダブルタップ拡大・ピンチ拡大の無効化（iOS Safari 二重対策）
============================================================ */
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 350) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());

/* ============================================================
   基本セットアップ
============================================================ */
const SKY = 0x9ed2ff;
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 90, 300);

const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 500);
camera.position.set(60, 8, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

scene.add(new THREE.HemisphereLight(0xcfe4ff, 0x8a7c62, 0.95));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.15);
sun.position.set(70, 120, 50);
scene.add(sun);

/* ============================================================
   物理ワールド
============================================================ */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = true;
world.defaultContactMaterial.friction = 0.35;
world.defaultContactMaterial.restitution = 0.15;

const groundMat = new CANNON.Material('ground');
const appleMat  = new CANNON.Material('apple');
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, appleMat, { friction: 0.4, restitution: 0.45 }));

// 地面
const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: groundMat });
groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
groundBody.aabbNeedsUpdate = true; // cannon-es対策: 構築直後(回転前)にAABBがキャッシュされるため、回転後に無効化して再計算させる
world.addBody(groundBody);

/* ============================================================
   街の見た目（地面・道路・歩道・建物）
   コース：一周する四角い道。中心線 |±60|、道はば14（53〜67）
============================================================ */
const matGrass = new THREE.MeshLambertMaterial({ color: 0x86b45e });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(420, 420), matGrass);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const matRoad = new THREE.MeshLambertMaterial({ color: 0x4a4d54 });
function addRoad(w, d, x, z) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), matRoad);
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.02, z);
  scene.add(m);
}
addRoad(14, 134, 60, 0);   // 東
addRoad(14, 134, -60, 0);  // 西
addRoad(134, 14, 0, -60);  // 北
addRoad(134, 14, 0, 60);   // 南

// 中央の破線
const matDash = new THREE.MeshLambertMaterial({ color: 0xe8e8e8 });
const dashGeo = new THREE.PlaneGeometry(0.35, 3);
const dashGeoH = new THREE.PlaneGeometry(3, 0.35);
for (let c = -60; c <= 60; c += 10) {
  for (const s of [60, -60]) {
    const m1 = new THREE.Mesh(dashGeo, matDash);
    m1.rotation.x = -Math.PI / 2; m1.position.set(s, 0.03, c); scene.add(m1);
    const m2 = new THREE.Mesh(dashGeoH, matDash);
    m2.rotation.x = -Math.PI / 2; m2.position.set(c, 0.03, s); scene.add(m2);
  }
}

// 歩道（少し高い＝縁石として物理あり）
const matWalk = new THREE.MeshLambertMaterial({ color: 0xb7bcc2 });
function addSidewalk(sx, sz, x, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx, 0.16, sz), matWalk);
  m.position.set(x, 0.08, z);
  scene.add(m);
  const b = new CANNON.Body({ mass: 0, material: groundMat,
    shape: new CANNON.Box(new CANNON.Vec3(sx / 2, 0.08, sz / 2)) });
  b.position.set(x, 0.08, z);
  world.addBody(b);
}
addSidewalk(3, 106, 51.5, 0);  addSidewalk(3, 106, -51.5, 0);
addSidewalk(106, 3, 0, 51.5);  addSidewalk(106, 3, 0, -51.5);
addSidewalk(3, 140, 68.5, 0);  addSidewalk(3, 140, -68.5, 0);
addSidewalk(140, 3, 0, 68.5);  addSidewalk(140, 3, 0, -68.5);

/* ---- 壁は撤去（コースの左右のガードレールをなくし、ビル街にも自由に行けるように） ---- */
const wallBodies = [];
// （代わりにビル本体に当たり判定をつける。下記「建物」セクション参照）

/* ---- 建物 ---- */
function buildingTexture(base, lit) {
  const cv = document.createElement('canvas');
  cv.width = 64; cv.height = 128;
  const g = cv.getContext('2d');
  g.fillStyle = base; g.fillRect(0, 0, 64, 128);
  for (let y = 8; y < 120; y += 14) {
    for (let x = 6; x < 58; x += 12) {
      g.fillStyle = Math.random() < 0.4 ? lit : '#2b3a52';
      g.fillRect(x, y, 8, 9);
    }
  }
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const bldSets = [
  ['#c8b8a4', '#ffe9a8'], ['#a9c0cc', '#fff3c0'], ['#d3c1c8', '#ffedb0'],
  ['#b9c9a8', '#fff0b8'], ['#c4c4cf', '#ffe9a8']
].map(([b, l]) => {
  const tex = buildingTexture(b, l);
  const side = new THREE.MeshLambertMaterial({ map: tex });
  const top = new THREE.MeshLambertMaterial({ color: 0x6d7278 });
  return [side, side, top, top, side, side];
});
const boxGeo = new THREE.BoxGeometry(1, 1, 1);
function addBuilding(x, z, w, h, d) {
  const m = new THREE.Mesh(boxGeo, bldSets[(Math.random() * bldSets.length) | 0]);
  m.scale.set(w, h, d);
  m.position.set(x, h / 2, z);
  scene.add(m);
  const b = new CANNON.Body({ mass: 0,
    shape: new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)) });
  b.position.set(x, h / 2, z);
  b.isWallLike = true;
  b.isBuilding = true;
  b.buildingMesh = m;
  world.addBody(b);
}
/* ---- ビル衝突演出：ヒビあと（デカール）と揺れ ---- */
function crackTexture() {
  const cv = document.createElement('canvas');
  cv.width = 96; cv.height = 96;
  const g = cv.getContext('2d');
  g.strokeStyle = 'rgba(30,26,22,0.85)';
  g.lineWidth = 2.2;
  for (let i = 0; i < 6; i++) {
    let px = 48, py = 48;
    const ang0 = (i / 6) * Math.PI * 2 + Math.random();
    g.beginPath();
    g.moveTo(px, py);
    for (let s = 0; s < 4; s++) {
      const ang = ang0 + (Math.random() - 0.5) * 1.1;
      px += Math.cos(ang) * (7 + Math.random() * 10);
      py += Math.sin(ang) * (7 + Math.random() * 10);
      g.lineTo(px, py);
    }
    g.stroke();
  }
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const crackMats = [crackTexture(), crackTexture()].map(t =>
  new THREE.MeshBasicMaterial({ map: t, transparent: true, depthWrite: false,
    polygonOffset: true, polygonOffsetFactor: -2 }));
const crackGeo = new THREE.PlaneGeometry(1.7, 1.7);
const crackDecals = [];
let crackIdx = 0;
for (let i = 0; i < 14; i++) {
  const m = new THREE.Mesh(crackGeo, crackMats[i % 2]);
  m.visible = false;
  scene.add(m);
  crackDecals.push(m);
}
function addCrack(pos, normal) {
  const m = crackDecals[crackIdx++ % crackDecals.length];
  m.visible = true;
  m.position.set(pos.x + normal.x * 0.08, Math.max(pos.y, 0.6), pos.z + normal.z * 0.08);
  m.lookAt(m.position.x + normal.x, m.position.y + normal.y, m.position.z + normal.z);
  m.rotateZ(Math.random() * Math.PI);
}
const shakingBuildings = [];
function shakeBuilding(mesh) {
  for (const s of shakingBuildings) if (s.mesh === mesh) { s.t = 0.45; return; }
  shakingBuildings.push({ mesh, t: 0.45 });
}
// 内側ブロック
for (let x = -40; x <= 40; x += 16) {
  for (let z = -40; z <= 40; z += 16) {
    if (Math.abs(x) < 20 && Math.abs(z) < 20) continue; // 中央は広場
    addBuilding(x + (Math.random() * 4 - 2), z + (Math.random() * 4 - 2),
      8 + Math.random() * 4, 6 + Math.random() * 16, 8 + Math.random() * 4);
  }
}
// 外側の街なみ
for (let c = -72; c <= 72; c += 18) {
  addBuilding(c, -80, 10 + Math.random() * 5, 8 + Math.random() * 18, 9);
  addBuilding(c, 80, 10 + Math.random() * 5, 8 + Math.random() * 18, 9);
  addBuilding(-80, c, 9, 8 + Math.random() * 18, 10 + Math.random() * 5);
  addBuilding(80, c, 9, 8 + Math.random() * 18, 10 + Math.random() * 5);
}
// 広場の木
const matTrunk = new THREE.MeshLambertMaterial({ color: 0x7a5a3a });
const matLeaf = new THREE.MeshLambertMaterial({ color: 0x4e8c46 });
for (let i = 0; i < 8; i++) {
  const x = (Math.random() - 0.5) * 32, z = (Math.random() - 0.5) * 32;
  const t = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 2.2, 6), matTrunk);
  t.position.set(x, 1.1, z); scene.add(t);
  const l = new THREE.Mesh(new THREE.ConeGeometry(1.6, 3.4, 7), matLeaf);
  l.position.set(x, 3.6, z); scene.add(l);
}

/* ---- 電柱（ぶつかると根元からへし折れる！煙が出て明かりが消える） ---- */
const lamps = [];
const matPole = new THREE.MeshLambertMaterial({ color: 0x5c6670 });
const lampPoleGeo = new THREE.CylinderGeometry(0.09, 0.11, 4, 6);
const lampHeadGeo = new THREE.SphereGeometry(0.25, 8, 6);
function addLamp(x, z) {
  const g = new THREE.Group();
  g.position.set(x, 2, z); // グループ原点＝柱の中心
  const pole = new THREE.Mesh(lampPoleGeo, matPole);
  g.add(pole);
  const headMat = new THREE.MeshBasicMaterial({ color: 0xffe9a0 });
  const head = new THREE.Mesh(lampHeadGeo, headMat);
  head.position.y = 2.1;
  g.add(head);
  scene.add(g);
  const b = new CANNON.Body({ mass: 0,
    shape: new CANNON.Cylinder(0.1, 0.12, 4, 6) });
  b.position.set(x, 2, z);
  b.isWallLike = true;
  b.isLamp = true;
  world.addBody(b);
  const lamp = { g, headMat, body: b, x, z, broken: false, dynBody: null, flickerT: 0 };
  b.lampRef = lamp;
  lamps.push(lamp);
}
function breakLamp(lamp, dirX, dirZ, v) {
  if (lamp.broken) return;
  lamp.broken = true;
  world.removeBody(lamp.body);
  // 動く柱として再生成（車に押された方向へ倒れる）
  const dyn = new CANNON.Body({ mass: 16,
    shape: new CANNON.Cylinder(0.1, 0.12, 4, 6) });
  dyn.position.set(lamp.x, 2.1, lamp.z);
  const push = Math.min(2 + v * 0.4, 7);
  dyn.velocity.set(dirX * push, 2.2, dirZ * push);
  dyn.angularVelocity.set(dirZ * 3.2, (Math.random() - 0.5) * 2, -dirX * 3.2);
  dyn.allowSleep = true;
  dyn.sleepSpeedLimit = 0.4;
  dyn.sleepTimeLimit = 0.8;
  world.addBody(dyn);
  lamp.dynBody = dyn;
  lamp.flickerT = 1.3; // 明かりがチカチカ→消灯
  // 折れた根元から煙
  for (let i = 0; i < 12; i++) {
    tmpV.set(lamp.x + (Math.random() - 0.5) * 0.4, 0.3, lamp.z + (Math.random() - 0.5) * 0.4);
    smokePool.spawn(tmpV,
      new THREE.Vector3((Math.random() - 0.5) * 1.5, 1.2 + Math.random() * 1.6, (Math.random() - 0.5) * 1.5),
      1.1 + Math.random() * 0.5, 0.7, -0.6, 1.5, 0.65);
  }
  sndThud(Math.min(v, 9));
  if (AC && soundOn) noiseBurst(AC.currentTime, 0.2, 0.18, 'lowpass', 700);
  addCombo();
  if (v > 9) triggerSlowMo();
}
function resetLamps() {
  for (const lamp of lamps) {
    if (lamp.dynBody) { world.removeBody(lamp.dynBody); lamp.dynBody = null; }
    if (lamp.broken) world.addBody(lamp.body);
    lamp.broken = false;
    lamp.flickerT = 0;
    lamp.g.position.set(lamp.x, 2, lamp.z);
    lamp.g.quaternion.identity();
    lamp.headMat.color.setHex(0xffe9a0);
  }
}
for (let c = -48; c <= 48; c += 24) {
  if (Math.abs(c) === 48) continue; // コーナー付近の街灯は撤去
  addLamp(51.6, c); addLamp(-51.6, c); addLamp(c, 51.6); addLamp(c, -51.6);
}

/* ============================================================
   コースのしかけ：階段・ジャンプ台・でこぼこ・水たまり
============================================================ */
const matStep = new THREE.MeshLambertMaterial({ color: 0xb0a89a });
function addStaticBox(sx, sy, sz, x, y, z, rx = 0, ry = 0, rz = 0, material = matStep) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), material);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  scene.add(m);
  const b = new CANNON.Body({ mass: 0, material: groundMat,
    shape: new CANNON.Box(new CANNON.Vec3(sx / 2, sy / 2, sz / 2)) });
  b.position.set(x, y, z);
  b.quaternion.setFromEuler(rx, ry, rz);
  b.aabbNeedsUpdate = true; // cannon-es対策: 回転後にAABBキャッシュを無効化して再計算させる
  world.addBody(b);
  return m;
}

      px = x0 + Math.cos(ang) * rad;

      ok = placed.every(p => Math.hypot(px - p.x, pz - p.z) > (Math.max(w, d) + Math.max(p.w, p.d)) * 0.62);
    }

class Pool {
  constructor(count, color, additive, size) {
    this.items = [];
    this.idx = 0;
    const geo = new THREE.PlaneGeometry(size, size);
    for (let i = 0; i < count; i++) {
      const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0, depthWrite: false,
        blending: additive ? THREE.AdditiveBlending : THREE.NormalBlending,
      });
      const m = new THREE.Mesh(geo, mat);
      m.visible = false;
      scene.add(m);
      this.items.push({ m, vel: new THREE.Vector3(), life: 0, max: 1, g: 0, grow: 0, baseO: 1 });
    }
  }
  spawn(pos, vel, life, scale, g, grow, opacity) {
    const p = this.items[this.idx++ % this.items.length];
    p.m.visible = true;
    p.m.position.copy(pos);
    p.m.scale.setScalar(scale);
    p.vel.copy(vel);
    p.life = p.max = life;
    p.g = g; p.grow = grow; p.baseO = opacity;
  }
  update(dt) {
    for (const p of this.items) {
      if (p.life <= 0) { p.m.visible = false; continue; }
      p.life -= dt;
      p.vel.y -= p.g * dt;
      p.m.position.addScaledVector(p.vel, dt);
      if (p.grow) p.m.scale.multiplyScalar(1 + p.grow * dt);
      p.m.material.opacity = Math.max(p.life / p.max, 0) * p.baseO;
      p.m.quaternion.copy(camera.quaternion);
    }
  }
}

let AC = null, master, engOsc, engGain, engFilter, skidGain, windGain, bgmGain, noiseBuf;
let soundOn = true;
function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain();
  master.gain.value = 0.85;
  master.connect(AC.destination);
  // エンジン音
  engOsc = AC.createOscillator();
  engOsc.type = 'sawtooth';
  engFilter = AC.createBiquadFilter();
  engFilter.type = 'lowpass';
  engFilter.frequency.value = 900;
  engGain = AC.createGain();
  engGain.gain.value = 0;
  engOsc.connect(engFilter); engFilter.connect(engGain); engGain.connect(master);
  engOsc.start();
  // ノイズバッファ
  noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  // スキッド音
  const skidSrc = AC.createBufferSource();
  skidSrc.buffer = noiseBuf; skidSrc.loop = true;
  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 850; bp.Q.value = 0.8;
  skidGain = AC.createGain(); skidGain.gain.value = 0;
  skidSrc.connect(bp); bp.connect(skidGain); skidGain.connect(master);
  skidSrc.start();
  // 風切り音（速度が上がるほど大きく高く：かっ飛ばす爽快感）
  const windSrc = AC.createBufferSource();
  windSrc.buffer = noiseBuf; windSrc.loop = true;
  const windFilter = AC.createBiquadFilter();
  windFilter.type = 'highpass'; windFilter.frequency.value = 1400;
  windGain = AC.createGain(); windGain.gain.value = 0;
  windSrc.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
  windSrc.start();
  // BGM
  bgmGain = AC.createGain();
  bgmGain.gain.value = 0.15;
  bgmGain.connect(master);
}
function note(freq, when, dur, type, vol, dest) {
  if (!AC || !soundOn) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + dur);
  o.connect(g); g.connect(dest || master);
  o.start(when); o.stop(when + dur + 0.02);
}
function noiseBurst(when, dur, vol, filterType, freq) {
  if (!AC || !soundOn) return;
  const s = AC.createBufferSource();
  s.buffer = noiseBuf;
  const f = AC.createBiquadFilter();
  f.type = filterType; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + dur);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(when); s.stop(when + dur + 0.02);
}
function sndThud(strength) {
  if (!AC || !soundOn) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(35, t + 0.15);
  const v = Math.min(0.1 + strength * 0.03, 0.4);
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.2);
  noiseBurst(t, 0.1, v * 0.5, 'lowpass', 500);
}
let lastPok = 0;
function sndPok() {
  if (!AC || !soundOn) return;
  const now = performance.now();

  lastPok = now;

}
function sndSplash() { if (AC) noiseBurst(AC.currentTime, 0.25, 0.18, 'highpass', 1200); }
function sndBoost() {
  if (!AC || !soundOn) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(880, t + 0.3);
  g.gain.setValueAtTime(0.14, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.4);
}
function sndCrash() {
  if (!AC || !soundOn) return;
  const t = AC.currentTime;
  noiseBurst(t, 0.25, 0.22, 'bandpass', 1800);

}
// BGMシーケンサー
const MEL = [659, 784, 880, 784, 659, 587, 523, 587, 659, 784, 880, 988, 1047, 988, 880, 784];
const BAS = [131, 110, 87, 98];
let bgmOn = false, bgmStep = 0, bgmNext = 0, bgmTimer = null;
function startBGM() {
  if (!AC || bgmOn) return;
  bgmOn = true; bgmStep = 0;
  bgmNext = AC.currentTime + 0.1;
  bgmTimer = setInterval(() => {
    while (bgmNext < AC.currentTime + 0.25) {
      const s = bgmStep % 16;
      note(MEL[s], bgmNext, 0.13, 'square', 0.1, bgmGain);
      if (s % 4 === 0) note(BAS[((bgmStep / 4) | 0) % 4], bgmNext, 0.45, 'triangle', 0.16, bgmGain);
      if (soundOn) noiseBurst(bgmNext, 0.03, 0.025, 'highpass', 6000);
      bgmNext += 0.15;
      bgmStep++;
    }
  }, 80);
}
function stopBGM() { bgmOn = false; if (bgmTimer) clearInterval(bgmTimer); }

{
  const base = document.getElementById('stickBase');
  const knob = document.getElementById('stickKnob');
  let pid = null;
  function updateStick(e) {
    const rect = base.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const max = rect.width / 2 - 30;
    let v = (e.clientX - cx) / max;
    v = Math.max(-1, Math.min(1, v));
    stickSteer = v;
    knob.style.transform = `translate(calc(-50% + ${(v * max).toFixed(1)}px), -50%)`;
  }
  base.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    pid = e.pointerId;
    try { base.setPointerCapture(pid); } catch (_) {}
    updateStick(e);
  });
  base.addEventListener('pointermove', (e) => {
    if (e.pointerId === pid) updateStick(e);
  });
  const endStick = (e) => {
    if (pid !== null && e.pointerId !== pid) return;
    pid = null;
    stickSteer = 0;
    knob.style.transform = 'translate(-50%, -50%)';
  };
  base.addEventListener('pointerup', endStick);
  base.addEventListener('pointercancel', endStick);
}

function fmt(ms) {
  if (ms == null) return '--:--.---';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const x = Math.floor(ms % 1000);
  return `${m}:${String(s).padStart(2, '0')}.${String(x).padStart(3, '0')}`;
}
const el = (id) => document.getElementById(id);

function respawn() {
  if (state !== 'race') return;
  const cp = checkpoints[(expected + 3) % 4];
  chassisBody.position.set(cp.x, 1.6, cp.z);
  chassisBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), cp.yaw);
  chassisBody.velocity.setZero();
  chassisBody.angularVelocity.setZero();
}
function carUpY() {
  const q = chassisBody.quaternion;
  return 1 - 2 * (q.x * q.x + q.z * q.z);
}
function tryFlipCar() {
  if (state !== 'race') return false;
  if (carUpY() > 0.5) return false; // すでに正立している
  // 向いていた方向（ヨー角）だけ残して起こす
  const q = chassisBody.quaternion;
  const yaw = Math.atan2(
    2 * (q.w * q.y + q.x * q.z),
    1 - 2 * (q.y * q.y + q.z * q.z)
  );
  chassisBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), yaw);
  chassisBody.position.y += 1.1;
  chassisBody.velocity.set(0, 0, 0);
  chassisBody.angularVelocity.set(0, 0, 0);
  chassisBody.wakeUp();
  shake = Math.min(shake + 0.35, 0.6);
  sndThud(6);
  wrongCool = 0;
  el('wrongMsg').style.display = 'none';
  return true;
}

let introT = 0;
let chickHopFrom = new THREE.Vector3();
const chickSeat = new THREE.Vector3(0, 0.95, -0.25); // キャブの定位置（ローカル）
function startIntro() {

  if (AC && soundOn) {

    note(1175, t + 0.32, 0.1, 'square', 0.12);
  }

function endIntro() {
  el('introSkip').style.display = 'none';
  carGroup.attach(chick);
  chick.position.copy(chickSeat);
  chick.quaternion.identity();
  chick.scale.setScalar(1);
  camPos.set(60, 7, 19.5); // 追従カメラの初期位置へ
  beginCountdown();
}
function updateIntro(dt) {
  introT += dt;
  const t = introT;
  if (t < 2.0) {
    // ご尊顔タイム：トラックの前でぴょこぴょこ
    chick.position.y = 0.32 + Math.abs(Math.sin(t * 5)) * 0.14;
    chick.rotation.z = Math.sin(t * 5) * 0.08;
    camera.fov += (58 - camera.fov) * Math.min(dt * 5, 1);
    camera.updateProjectionMatrix();
    camera.position.set(60, 0.95, 4.2);
    camera.lookAt(60, 0.75, 6.6);
  } else if (t < 2.8) {
    // ぴょんと乗り込む（放物線ジャンプ）
    if (chickHopFrom.lengthSq() === 0) {
      chickHopFrom.copy(chick.position);
      if (AC && soundOn) note(660, AC.currentTime, 0.12, 'square', 0.14);
    }
    const k = (t - 2.0) / 0.8;
    const seatWorld = carGroup.localToWorld(chickSeat.clone());
    chick.position.lerpVectors(chickHopFrom, seatWorld, k);
    chick.position.y += Math.sin(k * Math.PI) * 1.4; // 放物線
    chick.rotation.z = 0;
    chick.scale.setScalar(1.6 - 0.6 * k);
    camera.position.set(60, 1.6, 4.2);
    camera.lookAt(chick.position);
  } else if (t < 3.7) {
    // カメラが後方追従位置へスイープ
    const k = (t - 2.8) / 0.9;
    const ease = k * k * (3 - 2 * k);
    tmpV.set(60, 1.6, 4.2).lerp(new THREE.Vector3(60, 7, 19.5), ease);
    camera.position.copy(tmpV);
    camera.fov += (62 - camera.fov) * Math.min(dt * 4, 1);
    camera.updateProjectionMatrix();
    camera.lookAt(carGroup.position.x, carGroup.position.y + 1.4, carGroup.position.z);
    // ぴよは座席に固定
    const seatWorld = carGroup.localToWorld(chickSeat.clone());
    chick.position.copy(seatWorld);
    chick.scale.setScalar(1);
  } else {
    chickHopFrom.set(0, 0, 0);
    endIntro();
  }
}

function triggerSlowMo() {

chassisBody.addEventListener('collide', (e) => {
  const other = e.body;
  const v = Math.abs(e.contact.getImpactVelocityAlongNormal());
  const c = e.contact;
  const hitP = (c.bi === chassisBody)
    ? c.bi.position.vadd(c.ri) : c.bj.position.vadd(c.rj);
  // 車→相手方向（吹き飛ばし・倒しの向き）
  const pushDir = new CANNON.Vec3();
  other.position.vsub(chassisBody.position, pushDir);
  pushDir.y = 0;
  if (pushDir.length() < 0.05) pushDir.set(Math.random() - 0.5, 0, Math.random() - 0.5);
  pushDir.normalize();

  if (other.isLamp && v > 2.5) {
    // 電柱をへし折る！
    breakLamp(other.lampRef, pushDir.x, pushDir.z, v);
    return;
  }
  if (other.isWallLike && v > 3) {
    sndThud(v);
    shake = Math.min(shake + v * 0.045, 0.6);
    // 接触点に火花
    for (let i = 0; i < 8; i++) {
      tmpV.set(hitP.x, hitP.y + 0.2, hitP.z);
      sparkPool.spawn(tmpV,
        new THREE.Vector3((Math.random() - 0.5) * 7, 2 + Math.random() * 4, (Math.random() - 0.5) * 7),
        0.4, 0.9 + Math.random() * 0.6, 12, 0, 1);
    }
    if (other.isBuilding && v > 5) {
      // ビル：ヒビあと＋破片＋揺れ（倒壊はしない）
      const ni = c.ni;
      const outN = (c.bi === chassisBody)
        ? new THREE.Vector3(-ni.x, -ni.y, -ni.z) : new THREE.Vector3(ni.x, ni.y, ni.z);
      addCrack(hitP, outN);
      shakeBuilding(other.buildingMesh);
      for (let i = 0; i < 14; i++) {
        tmpV.set(hitP.x, hitP.y + 0.3, hitP.z);
        debrisPool.spawn(tmpV,
          new THREE.Vector3(outN.x * 3 + (Math.random() - 0.5) * 5,
            2 + Math.random() * 4.5, outN.z * 3 + (Math.random() - 0.5) * 5),
          0.7, 0.5 + Math.random() * 0.5, 10, 0, 0.9);
      }
      if (AC && soundOn) noiseBurst(AC.currentTime, 0.3, 0.2, 'lowpass', 500);
      if (v > 10) triggerSlowMo();
    }
  } else if (other.isVending && v > 3) {
    // 自販機：たおしてジュースをばらまく（1台につき最大2回）
    const now = performance.now();
    if (other.spillCount < 2 && now - other.lastSpill > 800) {
      other.spillCount++;
      other.lastSpill = now;
      spillCans(other.position, pushDir.x, pushDir.z);
      sndCrash();
      shake = Math.min(shake + 0.25, 0.6);
      addCombo();
    }
    sndPok();
  } else if (other.isHydrant && v > 3.5 && !other.sprayed) {
    // 消火栓：ふっとばすと水が噴き上がる！
    other.sprayed = true;
    hydrantSprays.push({ x: other.homeX, z: other.homeZ, t: 4.5 });
    if (AC && soundOn) noiseBurst(AC.currentTime, 0.5, 0.2, 'highpass', 1000);
    sndThud(v);
    addCombo();
  } else if (other.isProp && v > 1.5) {
    sndPok();
    if (other.isCardboard && v > 1.8) {
      // 段ボールを派手に吹き飛ばす
      const power = Math.min(4.5 + v * 1.5, 17);
      other.velocity.x += pushDir.x * power;
      other.velocity.z += pushDir.z * power;
      other.velocity.y += 3.5 + Math.random() * 3.5;
      other.angularVelocity.set(
        (Math.random() - 0.5) * 16, (Math.random() - 0.5) * 16, (Math.random() - 0.5) * 16);
      other.wakeUp();
      for (let i = 0; i < 12; i++) {
        tmpV.set(other.position.x, other.position.y + 0.15, other.position.z);
        dustPool.spawn(tmpV,
          new THREE.Vector3(pushDir.x * 4 + (Math.random() - 0.5) * 6, 2.5 + Math.random() * 4.5, pushDir.z * 4 + (Math.random() - 0.5) * 6),
          0.6, 0.4 + Math.random() * 0.35, 9, 0.6, 0.8);
      }
      addCombo();
    }
  }
});

/* ============================================================
   メインループ
============================================================ */
const clock = new THREE.Clock();
const MAX_STEER = 0.7, MAX_FORCE = 1350, BRAKE_FORCE = 26;
let steerCur = 0;
let airTime = 0;
let driftCharge = 0, boostTime = 0;
let wasDrifting = false;
let lampCool = 0, splashCool = 0, dustCool = 0, hudCool = 0, stairsCool = 0;
let wrongCool = 0;
let prevUpY = 1;
const camPos = new THREE.Vector3(60, 8, 30);
const rayFrom = new CANNON.Vec3(), rayTo = new CANNON.Vec3();
const rayRes = new CANNON.RaycastResult();
const qTmp = new CANNON.Quaternion();

function localVelocity() {
  chassisBody.quaternion.conjugate(qTmp);
  return qTmp.vmult(chassisBody.velocity);
}

renderer.setAnimationLoop(() => {
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 1 / 30); // 120Hz対策：クランプして固定ステップに供給
  // スローモーション：大クラッシュの瞬間だけ物理をゆっくりに
  slowMoCool -= dt;
  if (slowMoT > 0) slowMoT -= dt;
  const timeScale = slowMoT > 0 ? 0.35 : 1;
  const sdt = dt * timeScale;
  world.step(1 / 60, sdt, 4);
  // コンボの持続時間
  comboTimer -= dt;
  if (comboTimer <= 0) comboCount = 0;

  const now = performance.now();
  const speed = chassisBody.velocity.length();
  const lv = localVelocity();
  const fwdSpeed = -lv.z;
  const latSpeed = lv.x;

  /* ---- 操作 ---- */
  const racing = state === 'race';
  // スティック優先（右に倒す=+1 → 右に曲がる=負の操舵）。スティック中立時はキーボード
  const kbSteer = (input.left ? 1 : 0) - (input.right ? 1 : 0);
  const steerInput = stickSteer !== 0 ? -stickSteer : kbSteer;
  const steerTarget = racing ? steerInput * MAX_STEER : 0;
  steerCur += (steerTarget - steerCur) * Math.min(dt * 8, 1);
  vehicle.setSteeringValue(steerCur, 0);
  vehicle.setSteeringValue(steerCur, 1);

  let engine = 0, brake = 0;
  if (racing) {
    if (input.throttle) {
      const taper = Math.max(0, 1 - Math.max(fwdSpeed, 0) / 40);
      engine = MAX_FORCE * taper * (boostTime > 0 ? 1.7 : 1);
    }
    if (input.back) {
      if (fwdSpeed > 1.2) brake = BRAKE_FORCE;                 // 前進中はブレーキ
      else if (!input.throttle) engine = -MAX_FORCE * 0.5;     // 止まったら後退
    }
  } else {
    brake = state === 'finish' ? 14 : BRAKE_FORCE;
  }
  for (let i = 0; i < 4; i++) vehicle.setBrake(brake, i);
  vehicle.applyEngineForce(engine, 2);
  vehicle.applyEngineForce(engine, 3);

  /* ---- 接地・空中 ---- */
  let grounded = 0;
  for (let i = 0; i < 4; i++) if (vehicle.wheelInfos[i].isInContact) grounded++;
  if (grounded === 0) {
    airTime += dt;
  } else {
    if (airTime > 0.3) {
      shake = Math.min(shake + Math.min(airTime * 0.4, 0.5), 0.7);
      sndThud(Math.min(airTime * 8, 8));
    }
    airTime = 0;
  }

  /* ---- 水たまり ---- */
  let inPuddle = false;
  for (const p of puddles) {
    const dx = chassisBody.position.x - p.x, dz = chassisBody.position.z - p.z;
    if (dx * dx + dz * dz < p.r * p.r) { inPuddle = true; break; }
  }
  const fric = inPuddle ? PUDDLE_FRICTION : BASE_FRICTION;
  // 急ハンドル×速度で後輪だけグリップを落として、転がらずドリフトで曲がれるように
  const steerMag = Math.abs(steerCur) / MAX_STEER;
  const driftCut = inPuddle ? 0 : Math.min(steerMag * (fwdSpeed / 22), 0.42);
  const rearFric = fric * (1 - driftCut);
  for (let i = 0; i < 4; i++) vehicle.wheelInfos[i].frictionSlip = (i >= 2) ? rearFric : fric;
  if (inPuddle && speed > 6 && grounded > 0) {
    splashCool -= dt;
    if (splashCool <= 0) {
      splashCool = 0.05;
      sndSplash();
      for (let i = 0; i < 3; i++) {
        tmpV.set(chassisBody.position.x + (Math.random() - 0.5) * 1.6, 0.3,
          chassisBody.position.z + (Math.random() - 0.5) * 1.6);
        splashPool.spawn(tmpV,
          new THREE.Vector3((Math.random() - 0.5) * 4, 3 + Math.random() * 3, (Math.random() - 0.5) * 4),
          0.5, 0.7, 9, 0.5, 0.9);
      }
    }
  }

  /* ---- ドリフト＆ブースト ---- */
  const drifting = racing && grounded >= 2 && Math.abs(latSpeed) > 3.5 && fwdSpeed > 6;
  if (drifting && input.throttle) driftCharge += dt;
  if (wasDrifting && !drifting) {
    if (driftCharge > 0.7 && racing) {
      boostTime = 1.2;
      sndBoost();
      el('boostMsg').style.display = 'block';
      setTimeout(() => { el('boostMsg').style.display = 'none'; }, 800);
    }
    driftCharge = 0;
  }
  wasDrifting = drifting;
  if (boostTime > 0) boostTime -= dt;
  if (skidGain) skidGain.gain.value += (((drifting && soundOn) ? 0.12 : 0) - skidGain.gain.value) * Math.min(dt * 10, 1);

  /* ---- 砂ぼこり ---- */
  if (grounded > 0 && !inPuddle && (drifting || (input.throttle && fwdSpeed < 9 && racing))) {
    dustCool -= dt;
    if (dustCool <= 0) {
      dustCool = 0.06;
      for (const s of [-1, 1]) {
        const off = new THREE.Vector3(0.98 * s, 0.1, 1.7).applyQuaternion(carGroup.quaternion);
        tmpV.copy(carGroup.position).add(off);
        dustPool.spawn(tmpV,
          new THREE.Vector3((Math.random() - 0.5) * 2, 1 + Math.random(), (Math.random() - 0.5) * 2),
          0.7, 0.6, 0, 1.6, 0.55);
      }
    }
  }

  /* ---- 電柱ニアミス火花 ---- */
  lampCool -= dt;
  if (speed > 13 && lampCool <= 0) {
    for (const lamp of lamps) {
      if (lamp.broken) continue;
      const dx = chassisBody.position.x - lamp.x, dz = chassisBody.position.z - lamp.z;
      const d2 = dx * dx + dz * dz;
      if (d2 > 1.6 && d2 < 5.5) {
        lampCool = 0.5;
        for (let i = 0; i < 5; i++) {
          tmpV.set(lamp.x, 0.9 + Math.random(), lamp.z);
          sparkPool.spawn(tmpV,
            new THREE.Vector3((Math.random() - 0.5) * 6, 2 + Math.random() * 3, (Math.random() - 0.5) * 6),
            0.35, 0.8, 12, 0, 1);
        }
        break;
      }
    }
  }

  /* ---- 階段区間のガタガタ演出（当たり判定は滑らかだが音と揺れで段差感を出す） ---- */
  stairsCool -= dt;
  if (chassisBody.position.x > 13 && chassisBody.position.x < 25.5 &&
      Math.abs(chassisBody.position.z - (-60)) < 6.2 && speed > 2 && stairsCool <= 0) {
    stairsCool = Math.max(0.09, 1.1 / speed);
    shake = Math.min(shake + 0.06, 0.3);
    if (AC && soundOn) noiseBurst(AC.currentTime, 0.05, 0.05, 'lowpass', 400);
  }

  /* ---- ラップ判定 ---- */
  if (racing) {
    const cp = checkpoints[expected];
    const dx = chassisBody.position.x - cp.x, dz = chassisBody.position.z - cp.z;
    if (dx * dx + dz * dz < 13 * 13) {
      if (expected === 0) {
        const t = now - lapStart;
        lapTimes.push(t);
        lapStart = now;
        if (bestLap == null || t < bestLap) bestLap = t;
        lapsDone++;
        el('lastLapText').textContent = 'ラップ ' + fmt(t);
        el('bestLapText').textContent = 'ベスト ' + fmt(Math.min(bestLap, storedBest || Infinity));
        if (AC && soundOn) { note(784, AC.currentTime, 0.12, 'square', 0.15); note(1047, AC.currentTime + 0.12, 0.2, 'square', 0.15); }
        if (lapsDone >= TOTAL_LAPS) finishRace();
        else el('lapText').textContent = `LAP ${lapsDone + 1}/${TOTAL_LAPS}`;
      }
      expected = (expected + 1) % 4;
    }
    // 落下・場外の保険
    if (chassisBody.position.y < -4 || Math.abs(chassisBody.position.x) > 110 || Math.abs(chassisBody.position.z) > 110) respawn();
    // 横転の瞬間はスローモーション！
    const upYNow = carUpY();
    if (prevUpY > 0.5 && upYNow < 0.1) triggerSlowMo();
    prevUpY = upYNow;
    // 横転したまま動けない → 上スワイプの案内を出す
    if (upYNow < 0.25 && speed < 1) { wrongCool += dt; } else wrongCool = 0;
    el('wrongMsg').style.display = wrongCool > 1.0 ? 'block' : 'none';
  }

  /* ---- HUD ---- */
  hudCool -= dt;
  if (hudCool <= 0 && (racing || state === 'finish')) {
    hudCool = 0.08;
    if (racing) el('totalText').textContent = fmt(now - raceStart);
    el('speed').textContent = Math.round(fwdSpeed * 3.6) + ' km/h';
  }

  /* ---- 車の見た目を同期 ---- */
  carGroup.position.copy(chassisBody.position);
  carGroup.quaternion.copy(chassisBody.quaternion);
  for (let i = 0; i < 4; i++) {
    vehicle.updateWheelTransform(i);
    const t = vehicle.wheelInfos[i].worldTransform;
    wheelMeshes[i].position.copy(t.position);
    wheelMeshes[i].quaternion.copy(t.quaternion);
  }
  // にせ影（真下の地面をレイキャスト：始点は車体の底より下）
  rayFrom.set(chassisBody.position.x, chassisBody.position.y - 0.3, chassisBody.position.z);
  rayTo.set(chassisBody.position.x, chassisBody.position.y - 10, chassisBody.position.z);
  rayRes.reset();
  world.raycastClosest(rayFrom, rayTo, { skipBackfaces: true }, rayRes);
  if (rayRes.hasHit) {
    blobShadow.visible = true;
    blobShadow.position.set(chassisBody.position.x, rayRes.hitPointWorld.y + 0.03, chassisBody.position.z);
    const hgt = chassisBody.position.y - rayRes.hitPointWorld.y;
    blobShadow.material.opacity = Math.max(0.08, 0.32 - hgt * 0.05);
  } else blobShadow.visible = false;

  /* ---- 散乱オブジェクト同期 ---- */
  for (const p of props) {
    p.mesh.position.copy(p.body.position);
    p.mesh.quaternion.copy(p.body.quaternion);
  }
  for (const c of cans) {
    c.mesh.position.copy(c.body.position);
    c.mesh.quaternion.copy(c.body.quaternion);
  }
  // 折れた電柱の同期＆明かりのチカチカ
  for (const lamp of lamps) {
    if (lamp.dynBody) {
      lamp.g.position.copy(lamp.dynBody.position);
      lamp.g.quaternion.copy(lamp.dynBody.quaternion);
    }
    if (lamp.flickerT > 0) {
      lamp.flickerT -= dt;
      lamp.headMat.color.setHex(
        lamp.flickerT <= 0 || Math.sin(lamp.flickerT * 42) < 0 ? 0x333844 : 0xffe9a0);
    }
  }
  // 消火栓の水噴き上げ
  for (let i = hydrantSprays.length - 1; i >= 0; i--) {
    const sp = hydrantSprays[i];
    sp.t -= dt;
    if (sp.t <= 0) { hydrantSprays.splice(i, 1); continue; }
    for (let k = 0; k < 2; k++) {
      tmpV.set(sp.x + (Math.random() - 0.5) * 0.3, 0.3, sp.z + (Math.random() - 0.5) * 0.3);
      splashPool.spawn(tmpV,
        new THREE.Vector3((Math.random() - 0.5) * 2.5, 7 + Math.random() * 3.5, (Math.random() - 0.5) * 2.5),
        0.9, 0.55, 9, 0.4, 0.85);
    }
  }
  // ビルの揺れ
  for (let i = shakingBuildings.length - 1; i >= 0; i--) {
    const s = shakingBuildings[i];
    s.t -= dt;
    if (s.t <= 0) {
      s.mesh.rotation.z = 0;
      shakingBuildings.splice(i, 1);
    } else {
      s.mesh.rotation.z = Math.sin(s.t * 45) * 0.014 * (s.t / 0.45);
    }
  }

  /* ---- NPC更新 ---- */
  const carP = carGroup.position;
  for (const flock of birdFlocks) {
    const dx = flock.cx - carP.x, dz = flock.cz - carP.z;
    const d2 = dx * dx + dz * dz;
    if (flock.state === 'ground' && d2 < 144) {
      flock.state = 'fly';
      flock.t = 0;
      if (AC && soundOn) noiseBurst(AC.currentTime, 0.12, 0.08, 'highpass', 3000);
      for (const b of flock.birds) {
        const bx = b.g.position.x - carP.x, bz = b.g.position.z - carP.z;
        const d = Math.hypot(bx, bz) || 1;
        b.vel.set((bx / d) * 7 + (Math.random() - 0.5) * 3, 5 + Math.random() * 3, (bz / d) * 7 + (Math.random() - 0.5) * 3);
      }
    }
    if (flock.state === 'fly') {
      flock.t += dt;
      for (const b of flock.birds) {
        b.ph += dt * 22;
        b.g.position.addScaledVector(b.vel, dt);
        b.vel.y = Math.max(b.vel.y - 2 * dt, 0.5);
        b.g.rotation.y = Math.atan2(b.vel.x, b.vel.z);
        for (const c of b.g.children) if (c.userData.s) c.rotation.z = Math.sin(b.ph) * 0.9 * c.userData.s;
      }
      if (flock.t > 6 && d2 > 900) {
        flock.state = 'ground';
        for (const b of flock.birds) {
          b.g.position.copy(b.home);
          b.vel.set(0, 0, 0);
        }
      }
    } else {
      for (const b of flock.birds) {
        b.ph += dt * 3;
        b.g.position.y = 0.1 + Math.max(0, Math.sin(b.ph)) * 0.02;
        for (const c of b.g.children) if (c.userData.s) c.rotation.z = 0.15 * c.userData.s;
      }
    }
  }

  /* ---- パーティクル ---- */
  dustPool.update(sdt);
  splashPool.update(sdt);
  sparkPool.update(sdt);
  smokePool.update(sdt);
  debrisPool.update(sdt);

  /* ---- カメラ ---- */
  shake *= Math.exp(-dt * 3.5);
  if (state === 'intro') {
    updateIntro(dt);
  } else {
    const targetFov = (viewMode === 'chase' ? 62 : 74) + Math.min(Math.abs(fwdSpeed) * 0.35, 14) + (boostTime > 0 ? 10 : 0);
    camera.fov += (targetFov - camera.fov) * Math.min(dt * 5, 1);
    camera.updateProjectionMatrix();
    if (viewMode === 'chase') {
      const off = new THREE.Vector3(0, 6.2, 9.5).applyQuaternion(carGroup.quaternion);
      tmpV.copy(carGroup.position).add(off);
      camPos.lerp(tmpV, 1 - Math.exp(-dt * 4.5));
      camera.position.copy(camPos);
      camera.position.x += (Math.random() - 0.5) * shake;
      camera.position.y += (Math.random() - 0.5) * shake;
      camera.lookAt(carGroup.position.x, carGroup.position.y + 1.4, carGroup.position.z);
    } else {
      const off = new THREE.Vector3(0, 1.15, -0.15).applyQuaternion(carGroup.quaternion);
      camera.position.copy(carGroup.position).add(off);
      camera.position.y += (Math.random() - 0.5) * shake * 0.5;
      const look = new THREE.Vector3(0, 0.85, -12).applyQuaternion(carGroup.quaternion);
      tmpV.copy(carGroup.position).add(look);
      camera.lookAt(tmpV);
      camPos.copy(camera.position);
    }
  }

  /* ---- エンジン音 ---- */
  if (engGain) {
    const playing = state === 'race' || state === 'count';
    const target = playing && soundOn
      ? Math.min(0.045 + (input.throttle ? 0.05 : 0) + Math.abs(fwdSpeed) * 0.0015, 0.13) : 0;
    engGain.gain.value += (target - engGain.gain.value) * Math.min(dt * 8, 1);
    engOsc.frequency.value = 75 + Math.abs(fwdSpeed) * 7 + (input.throttle ? 35 : 0);
  }
  if (windGain) {
    const playing = state === 'race';
    const windTarget = playing && soundOn ? Math.min(Math.max(fwdSpeed - 16, 0) * 0.006, 0.07) : 0;
    windGain.gain.value += (windTarget - windGain.gain.value) * Math.min(dt * 6, 1);
  }

  renderer.render(scene, camera);
});
</script>
